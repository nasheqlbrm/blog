<link rel="stylesheet" href="https://unpkg.com/@curvenote/article/dist/curvenote.css">
<script async="" src="https://unpkg.com/@curvenote/article"></script>
<r-equation>
    y(x) = a*x^{2}
  </r-equation>
<r-var name="a" value="1"></r-var>
<p style="text-align:center;">
  <r-svg-chart width="400", height="400" xlim="[-3, 3]" ylim="[-3,3]" xlabel="x" ylabel="y" x-axis-location="origin" y-axis-location="origin">
    <r-svg-eqn eqn="a * x * x" stroke="blue" stroke-width="3" :listen="a"> </r-svg-eqn>
  </r-svg-chart>
  <strong>a:</strong> <r-dynamic bind="a" min="-10" max="10" step="1"></r-dynamic><br>
</p>
